name: GitHub Profile 3D Contrib

on:
  schedule:
    # Once daily at 18:42 UTC (off the top-of-hour rush)
    - cron: "42 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-3d-contrib:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push SVGs (race-tolerant)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main || true

          git add profile-3d-contrib
          git commit -m "chore: refresh 3D contribution calendar" || exit 0

          if ! git push; then
            git pull --rebase origin main
            git push
          fi
