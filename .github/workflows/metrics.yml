name: Metrics

on:
  # Once daily at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Manual "Run workflow" button
  workflow_dispatch:
  # On push to main (SVG path ignored so the action's own commit can't re-trigger)
  push:
    branches: [main]
    paths-ignore:
      - "github-metrics.svg"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ---- Core ----
          token: ${{ secrets.METRICS_TOKEN }}
          user: ggkchen
          template: classic
          filename: github-metrics.svg
          config_timezone: America/Los_Angeles

          # ---- Commit the SVG back to the repo (metrics does this itself via the API) ----
          output_action: commit
          committer_branch: main
          committer_message: "chore: update github-metrics.svg [skip ci]"

          # ---- Base sections ----
          base: "header, activity, community, repositories, metadata"
          base_hireable: yes

          # ---- Isometric contribution calendar (full year) ----
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ---- Language breakdown (indepth + detailed) ----
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          # ---- Habits (charts + facts) ----
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200

          # ---- Achievements ----
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          # ---- Lines of code changed ----
          plugin_lines: yes
