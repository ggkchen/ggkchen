name: Tic-Tac-Toe Bot

on:
  issues:
    types: [opened]
  workflow_dispatch:

# Serialize runs so concurrent games never clobber README.md / the state file.
concurrency:
  group: ttt-game
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  play:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute move and update board
        id: play
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // ---------- pure game logic ----------
            const LINES = [
              [0,1,2],[3,4,5],[6,7,8],
              [0,3,6],[1,4,7],[2,5,8],
              [0,4,8],[2,4,6],
            ];
            const emptyBoard = () => ['','','','','','','','',''];
            function checkWinner(b) {
              for (const [a,c,d] of LINES) {
                if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
              }
              return null;
            }
            const isFull = (b) => b.every((c) => c === 'X' || c === 'O');
            function applyMove(b, i, p) {
              if (!Number.isInteger(i) || i < 0 || i > 8) throw new Error('index out of range: ' + i);
              if (b[i] === 'X' || b[i] === 'O') throw new Error('cell occupied: ' + i);
              if (p !== 'X' && p !== 'O') throw new Error('bad player: ' + p);
              const n = b.slice(); n[i] = p; return n;
            }
            function findWinningMove(b, p) {
              for (const line of LINES) {
                const empties = line.filter((i) => b[i] === '');
                const count = line.filter((i) => b[i] === p).length;
                if (count === 2 && empties.length === 1) return empties[0];
              }
              return -1;
            }
            function chooseBotMove(b, seed) {
              const empties = [];
              for (let i = 0; i < 9; i++) if (b[i] === '') empties.push(i);
              if (empties.length === 0) return -1;
              const win = findWinningMove(b, 'O'); if (win !== -1) return win;
              const block = findWinningMove(b, 'X'); if (block !== -1) return block;
              if (b[4] === '') return 4;
              const s = Number.isFinite(seed) ? Math.abs(Math.floor(seed)) : 0;
              const corners = [0,2,6,8].filter((i) => b[i] === '');
              if (corners.length) return corners[s % corners.length];
              const sides = [1,3,5,7].filter((i) => b[i] === '');
              if (sides.length) return sides[s % sides.length];
              return empties[s % empties.length];
            }
            function renderBoardMarkdown(b, status, owner, repo) {
              const base = `https://github.com/${owner}/${repo}/issues/new`;
              const cellLink = (i) => {
                const body = encodeURIComponent(
                  "Casting my tic-tac-toe move as X on cell " + i +
                  ". Leave the title as-is and submit — the bot answers within ~1 min."
                );
                return `[&nbsp;⬜&nbsp;](${base}?title=ttt%7Cmove%7C${i}&body=${body})`;
              };
              const newGameLink = () => {
                const body = encodeURIComponent("Starting a fresh tic-tac-toe game. Submit to reset the board.");
                return `[start a new game](${base}?title=ttt%7Cnew&body=${body})`;
              };
              const cell = (i) => {
                if (b[i] === 'X') return '❌';
                if (b[i] === 'O') return '⭕';
                if (status === 'playing') return cellLink(i);
                return '⬜';
              };
              const rows = ['|  |  |  |', '|:-:|:-:|:-:|'];
              for (let r = 0; r < 3; r++) {
                rows.push(`| ${cell(r*3)} | ${cell(r*3+1)} | ${cell(r*3+2)} |`);
              }
              let statusLine;
              if (status === 'X') statusLine = `🎉 **You win!** Nicely done. → ${newGameLink()}`;
              else if (status === 'O') statusLine = `🤖 **The repo wins.** Beep boop. → ${newGameLink()}`;
              else if (status === 'draw') statusLine = `🤝 **Draw.** Honourable. → ${newGameLink()}`;
              else statusLine = "You're **X** — click a square, a GitHub issue casts your move, the bot answers within ~1 min.";
              return rows.join('\n') + '\n\n' + statusLine;
            }

            // ---------- decision ----------
            function play(state, title, issueNumber) {
              const NEW = 'ttt|new';
              const MOVE = 'ttt|move|';
              title = (title || '').trim();
              if (title === NEW) {
                return { state: { board: emptyBoard(), status: 'playing' }, comment: "🔄 Fresh board! You're **X** — head back to the profile README and click a square.", close: true, changed: true };
              }
              if (title.startsWith(MOVE)) {
                if (state.status !== 'playing') {
                  return { state, comment: "That game already finished. Start a new one with the **start a new game** link on the board.", close: true, changed: false };
                }
                const idx = parseInt(title.slice(MOVE.length), 10);
                if (!Number.isInteger(idx) || idx < 0 || idx > 8) {
                  return { state, comment: "Hmm, that move didn't parse (cell must be 0–8). Try clicking a square on the board.", close: true, changed: false };
                }
                if (state.board[idx] !== '') {
                  return { state, comment: "That square's already taken! Pick an empty one on the board.", close: true, changed: false };
                }
                let board = applyMove(state.board, idx, 'X');
                if (checkWinner(board) === 'X') return { state: { board, status: 'X' }, comment: "🎉 You beat the repo. Respect.", close: true, changed: true };
                if (isFull(board)) return { state: { board, status: 'draw' }, comment: "🤝 A draw. Well played.", close: true, changed: true };
                const bot = chooseBotMove(board, issueNumber);
                board = applyMove(board, bot, 'O');
                if (checkWinner(board) === 'O') return { state: { board, status: 'O' }, comment: "🤖 The repo wins this one. Rematch?", close: true, changed: true };
                if (isFull(board)) return { state: { board, status: 'draw' }, comment: "🤝 A draw. Well played.", close: true, changed: true };
                return { state: { board, status: 'playing' }, comment: `Move played — I answered with **O** on cell ${bot}. Your turn on the board! 🎯`, close: true, changed: true };
              }
              return { state, comment: '', close: false, changed: false };
            }

            // ---------- IO ----------
            const { owner, repo } = context.repo;
            const isDispatch = context.eventName === 'workflow_dispatch';
            const issue = context.payload && context.payload.issue;
            const title = isDispatch ? '' : (issue && issue.title) || '';
            const issueNumber = isDispatch ? 0 : (issue && issue.number) || 0;

            const statePath = path.join('game', 'tictactoe.json');
            let state = { board: emptyBoard(), status: 'playing' };
            try {
              if (fs.existsSync(statePath)) {
                const parsed = JSON.parse(fs.readFileSync(statePath, 'utf8'));
                if (Array.isArray(parsed.board) && parsed.board.length === 9 && typeof parsed.status === 'string') {
                  state = { board: parsed.board.map((c) => (c === 'X' || c === 'O') ? c : ''), status: parsed.status };
                }
              }
            } catch (e) { core.warning('Could not read state, starting fresh: ' + e.message); }

            const result = play(state, title, issueNumber);
            if (isDispatch) result.changed = true; // dispatch (re)initializes files

            if (result.changed) {
              fs.mkdirSync('game', { recursive: true });
              fs.writeFileSync(statePath, JSON.stringify(result.state, null, 2) + '\n');

              const block = renderBoardMarkdown(result.state.board, result.state.status, owner, repo);
              const key = 'ttt';
              const start = `<!--START_SECTION:${key}-->`;
              const end = `<!--END_SECTION:${key}-->`;
              let readme = fs.readFileSync('README.md', 'utf8');
              const si = readme.indexOf(start);
              const ei = readme.indexOf(end);
              if (si === -1 || ei === -1 || ei < si) {
                throw new Error('README markers <!--START_SECTION:ttt--> / <!--END_SECTION:ttt--> not found');
              }
              readme = readme.slice(0, si + start.length) + '\n' + block + '\n' + readme.slice(ei);
              fs.writeFileSync('README.md', readme);
            }

            core.setOutput('comment', result.comment || '');
            core.setOutput('close', result.close ? 'true' : 'false');
            core.setOutput('changed', result.changed ? 'true' : 'false');

      - name: Commit updated board
        if: steps.play.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add README.md game/tictactoe.json
          git commit -m "ttt: update board [skip ci]" || exit 0
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)

      - name: Reply and close the issue
        if: steps.play.outputs.comment != '' && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          TTT_COMMENT: ${{ steps.play.outputs.comment }}
          TTT_CLOSE: ${{ steps.play.outputs.close }}
        with:
          script: |
            const body = process.env.TTT_COMMENT;
            const shouldClose = process.env.TTT_CLOSE === 'true';
            const issue_number = context.payload.issue.number;
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            if (shouldClose) {
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
            }
